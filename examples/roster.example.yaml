# .war-room/roster.yaml — optional. Without it, war-room runs the five default officers.
#
# A roster replaces the generic officers with your project's real domains. Each officer
# still wears a persona (the skin), but its slice becomes a real slice of your codebase
# (the skeleton — what makes it a distinct model of the problem, not just a different tone).
#
# Rules of thumb:
#   - 3 to 5 substantive officers. Beyond 5 you buy back correlation, not independence.
#   - each officer must read a DIFFERENT slice or optimize a DIFFERENT objective —
#     two officers with the same model of the problem is cosmetic diversity.
#   - never list a second devil's advocate: the Tenth Man is the one mandated dissenter,
#     always present, never configured away.

depth: quick            # quick (default) | thorough

officers:
  - persona: The Scout
    optimizes: epistemic certainty — fact vs assumption
    reads: ["docs/", "src/config", "README.md"]
    asks: "Do we know this or assume it — and what falls if the assumption is wrong?"

  - persona: The Strategist
    optimizes: the option space — reframes, finds the third door
    reads: ["src/", "docs/adr"]
    asks: "What if the real problem isn't the one we think — what's the third option?"

  - persona: The Quartermaster
    optimizes: feasibility — resources, what breaks at delivery
    reads: ["package.json", "src/infra", "migrations/"]
    asks: "Who does what with what, and which link snaps first?"

# The Marshal (synthesizes the winning course) and the Tenth Man (mandated dissent,
# runs last against the consensus) are always seated by war-room itself — do not list them.
